<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>引导输入 - tailorCV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            color: white;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .nav-tab {
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-tab:hover, .nav-tab.active {
            background: white;
            color: #667eea;
        }

        .main-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }

        .form-group label .required {
            color: #e53935;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .entry-list {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .entry-item {
            background: #f8f9ff;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            position: relative;
        }

        .entry-item:last-child {
            margin-bottom: 0;
        }

        .entry-remove {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #e53935;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-add {
            padding: 8px 16px;
            background: #f0f3ff;
            border: 1px dashed #667eea;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
        }

        .btn-add:hover {
            background: #e8edff;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: white;
            border: 1px solid #ddd;
            color: #666;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .progress-container {
            display: none;
            margin-top: 30px;
        }

        .progress-container.show {
            display: block;
        }

        .progress-bar {
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #666;
        }

        .result-container {
            display: none;
            margin-top: 30px;
        }

        .result-container.show {
            display: block;
        }

        .result-card {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .match-score {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .score-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .download-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn-download {
            padding: 12px 30px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-download:hover {
            background: #667eea;
            color: white;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            color: white;
            opacity: 0.8;
        }

        .preview-section {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            display: none;
        }

        .preview-section.show {
            display: block;
        }

        .preview-content {
            white-space: pre-wrap;
            font-size: 14px;
            color: #333;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>tailorCV - 引导输入</h1>
            <p>填写以下信息，生成你的定制简历</p>
        </header>

        <nav class="nav-tabs">
            <a href="/" class="nav-tab">文件上传</a>
            <a href="/guided" class="nav-tab active">引导输入</a>
            <a href="/history" class="nav-tab">历史记录</a>
        </nav>

        <div class="main-card">
            <form id="guidedForm">
                <!-- 基本信息 -->
                <div class="section">
                    <div class="section-title">基本信息</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>姓名 <span class="required">*</span></label>
                            <input type="text" name="name" required>
                        </div>
                        <div class="form-group">
                            <label>性别</label>
                            <select name="gender">
                                <option value="">请选择</option>
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>年龄</label>
                            <input type="number" name="age" min="16" max="65">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>手机号 <span class="required">*</span></label>
                            <input type="tel" name="phone" required>
                        </div>
                        <div class="form-group">
                            <label>邮箱 <span class="required">*</span></label>
                            <input type="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label>现居地</label>
                            <input type="text" name="location">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>政治面貌</label>
                            <input type="text" name="political_status" placeholder="如：中共党员、共青团员">
                        </div>
                    </div>
                </div>

                <!-- 教育背景 -->
                <div class="section">
                    <div class="section-title">教育背景</div>
                    <div class="entry-list" id="educationList">
                        <div class="entry-item">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>学校</label>
                                    <input type="text" name="edu_school_0">
                                </div>
                                <div class="form-group">
                                    <label>专业</label>
                                    <input type="text" name="edu_major_0">
                                </div>
                                <div class="form-group">
                                    <label>学历</label>
                                    <select name="edu_degree_0">
                                        <option value="">请选择</option>
                                        <option value="大专">大专</option>
                                        <option value="本科">本科</option>
                                        <option value="硕士">硕士</option>
                                        <option value="博士">博士</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>时间</label>
                                    <input type="text" name="edu_time_0" placeholder="如：2018.09-2022.06">
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" name="edu_count" id="eduCount" value="1">
                    <button type="button" class="btn-add" onclick="addEducation()">+ 添加教育经历</button>
                </div>

                <!-- 工作经历 -->
                <div class="section">
                    <div class="section-title">工作经历</div>
                    <div class="entry-list" id="workList">
                        <div class="entry-item">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>公司</label>
                                    <input type="text" name="work_company_0">
                                </div>
                                <div class="form-group">
                                    <label>职位</label>
                                    <input type="text" name="work_position_0">
                                </div>
                                <div class="form-group">
                                    <label>时间</label>
                                    <input type="text" name="work_time_0" placeholder="如：2022.07-至今">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>工作内容与成就</label>
                                <textarea name="work_content_0" rows="4" placeholder="描述你的主要工作职责和取得的成就..."></textarea>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" name="work_count" id="workCount" value="1">
                    <button type="button" class="btn-add" onclick="addWork()">+ 添加工作经历</button>
                </div>

                <!-- 项目经历 -->
                <div class="section">
                    <div class="section-title">项目经历（可选）</div>
                    <div class="entry-list" id="projectList">
                        <div class="entry-item">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>项目名称</label>
                                    <input type="text" name="proj_name_0">
                                </div>
                                <div class="form-group">
                                    <label>角色</label>
                                    <input type="text" name="proj_role_0">
                                </div>
                                <div class="form-group">
                                    <label>时间</label>
                                    <input type="text" name="proj_time_0">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>项目成果</label>
                                <textarea name="proj_content_0" rows="3" placeholder="描述项目背景、你的贡献和项目成果..."></textarea>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" name="proj_count" id="projCount" value="1">
                    <button type="button" class="btn-add" onclick="addProject()">+ 添加项目经历</button>
                </div>

                <!-- 专业技能 -->
                <div class="section">
                    <div class="section-title">专业技能</div>
                    <div class="form-group">
                        <label>技能列表</label>
                        <textarea name="skills" rows="3" placeholder="输入你的专业技能，用换行或逗号分隔&#10;例如：Python, 数据分析, 项目管理"></textarea>
                    </div>
                </div>

                <!-- 奖项荣誉 -->
                <div class="section">
                    <div class="section-title">奖项荣誉（可选）</div>
                    <div class="form-group">
                        <textarea name="awards" rows="2" placeholder="输入你的奖项荣誉，用换行分隔"></textarea>
                    </div>
                </div>

                <!-- 证书资质 -->
                <div class="section">
                    <div class="section-title">证书资质（可选）</div>
                    <div class="form-group">
                        <textarea name="certificates" rows="2" placeholder="输入你的证书资质，用换行分隔"></textarea>
                    </div>
                </div>

                <!-- 自我评价 -->
                <div class="section">
                    <div class="section-title">自我评价（可选）</div>
                    <div class="form-group">
                        <textarea name="self_evaluation" rows="3" placeholder="简要描述你的优势和职业目标..."></textarea>
                    </div>
                </div>

                <!-- 职位JD -->
                <div class="section">
                    <div class="section-title">目标职位JD</div>
                    <div class="form-group">
                        <label>职位描述 <span class="required">*</span></label>
                        <textarea name="jd" rows="6" required placeholder="粘贴目标职位的JD内容..."></textarea>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" onclick="previewResume()">预览简历</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">生成定制简历</button>
                </div>
            </form>

            <!-- 预览区域 -->
            <div class="preview-section" id="previewSection">
                <div class="section-title">简历预览</div>
                <div class="preview-content" id="previewContent"></div>
            </div>

            <!-- 进度显示 -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">正在处理...</div>
            </div>

            <!-- 结果显示 -->
            <div class="result-container" id="resultContainer">
                <div class="result-card">
                    <div class="result-title">生成完成</div>
                    <div class="match-score">
                        <div class="score-circle" id="matchScore">75</div>
                        <div>
                            <h3>匹配度: <span id="matchLevel">良好</span></h3>
                            <p>你的定制简历已生成</p>
                        </div>
                    </div>
                </div>

                <div class="download-buttons">
                    <a href="#" class="btn-download" id="downloadWord">📄 下载 Word 文档</a>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 tailorCV - 基于 ZhipuAI GLM 智能定制</p>
        </footer>
    </div>

    <script>
        // 添加教育经历
        let eduCount = 1;
        function addEducation() {
            const list = document.getElementById('educationList');
            const item = document.createElement('div');
            item.className = 'entry-item';
            item.innerHTML = `
                <span class="entry-remove" onclick="this.parentElement.remove()">✕ 移除</span>
                <div class="form-row">
                    <div class="form-group">
                        <label>学校</label>
                        <input type="text" name="edu_school_${eduCount}">
                    </div>
                    <div class="form-group">
                        <label>专业</label>
                        <input type="text" name="edu_major_${eduCount}">
                    </div>
                    <div class="form-group">
                        <label>学历</label>
                        <select name="edu_degree_${eduCount}">
                            <option value="">请选择</option>
                            <option value="大专">大专</option>
                            <option value="本科">本科</option>
                            <option value="硕士">硕士</option>
                            <option value="博士">博士</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>时间</label>
                        <input type="text" name="edu_time_${eduCount}">
                    </div>
                </div>
            `;
            list.appendChild(item);
            eduCount++;
            document.getElementById('eduCount').value = eduCount;
        }

        // 添加工作经历
        let workCount = 1;
        function addWork() {
            const list = document.getElementById('workList');
            const item = document.createElement('div');
            item.className = 'entry-item';
            item.innerHTML = `
                <span class="entry-remove" onclick="this.parentElement.remove()">✕ 移除</span>
                <div class="form-row">
                    <div class="form-group">
                        <label>公司</label>
                        <input type="text" name="work_company_${workCount}">
                    </div>
                    <div class="form-group">
                        <label>职位</label>
                        <input type="text" name="work_position_${workCount}">
                    </div>
                    <div class="form-group">
                        <label>时间</label>
                        <input type="text" name="work_time_${workCount}">
                    </div>
                </div>
                <div class="form-group">
                    <label>工作内容与成就</label>
                    <textarea name="work_content_${workCount}" rows="4"></textarea>
                </div>
            `;
            list.appendChild(item);
            workCount++;
            document.getElementById('workCount').value = workCount;
        }

        // 添加项目经历
        let projCount = 1;
        function addProject() {
            const list = document.getElementById('projectList');
            const item = document.createElement('div');
            item.className = 'entry-item';
            item.innerHTML = `
                <span class="entry-remove" onclick="this.parentElement.remove()">✕ 移除</span>
                <div class="form-row">
                    <div class="form-group">
                        <label>项目名称</label>
                        <input type="text" name="proj_name_${projCount}">
                    </div>
                    <div class="form-group">
                        <label>角色</label>
                        <input type="text" name="proj_role_${projCount}">
                    </div>
                    <div class="form-group">
                        <label>时间</label>
                        <input type="text" name="proj_time_${projCount}">
                    </div>
                </div>
                <div class="form-group">
                    <label>项目成果</label>
                    <textarea name="proj_content_${projCount}" rows="3"></textarea>
                </div>
            `;
            list.appendChild(item);
            projCount++;
            document.getElementById('projCount').value = projCount;
        }

        // 预览简历
        async function previewResume() {
            const form = document.getElementById('guidedForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                document.getElementById('previewContent').textContent = result.preview_text || '预览失败';
                document.getElementById('previewSection').classList.add('show');
            } catch (error) {
                alert('预览失败: ' + error.message);
            }
        }

        // 表单提交
        const form = document.getElementById('guidedForm');
        const submitBtn = document.getElementById('submitBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultContainer = document.getElementById('resultContainer');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            progressContainer.classList.add('show');
            resultContainer.classList.remove('show');
            submitBtn.disabled = true;
            progressFill.style.width = '0%';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                progressText.textContent = '正在构建简历...';
                progressFill.style.width = '10%';

                const response = await fetch('/api/tailor/form', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                progressFill.style.width = '50%';
                progressText.textContent = '正在AI分析...';

                const result = await response.json();

                if (result.error) {
                    throw new Error(result.error);
                }

                progressFill.style.width = '100%';
                progressText.textContent = '完成！';

                // 显示结果
                document.getElementById('matchScore').textContent = result.analysis?.match_score || 75;
                document.getElementById('matchLevel').textContent = result.analysis?.match_level || '良好';
                resultContainer.classList.add('show');

                // 下载按钮
                if (result.tailored_word) {
                    const blob = base64ToBlob(result.tailored_word, 'application/vnd.openxmlformats-officedocument.wordprocessingml.document');
                    const url = URL.createObjectURL(blob);
                    document.getElementById('downloadWord').href = url;
                    document.getElementById('downloadWord').download = '定制简历.docx';
                }

            } catch (error) {
                alert('处理失败: ' + error.message);
                progressContainer.classList.remove('show');
            } finally {
                submitBtn.disabled = false;
            }
        });

        function base64ToBlob(base64, mimeType) {
            const byteCharacters = atob(base64);
            const byteArrays = [];
            for (let offset = 0; offset < byteCharacters.length; offset += 512) {
                const slice = byteCharacters.slice(offset, offset + 512);
                const byteNumbers = new Array(slice.length);
                for (let i = 0; i < slice.length; i++) {
                    byteNumbers[i] = slice.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                byteArrays.push(byteArray);
            }
            return new Blob(byteArrays, { type: mimeType });
        }
    </script>
</body>
</html>
