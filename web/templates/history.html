<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史记录 - tailorCV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            color: white;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .nav-tab {
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-tab:hover, .nav-tab.active {
            background: white;
            color: #667eea;
        }

        .main-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            min-height: 400px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .empty-hint {
            font-size: 14px;
        }

        .history-list {
            margin-top: 20px;
        }

        .history-item {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .history-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.1);
        }

        .history-info {
            flex: 1;
        }

        .history-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .history-meta {
            font-size: 14px;
            color: #999;
        }

        .history-meta span {
            margin-right: 20px;
        }

        .history-score {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            margin-right: 20px;
        }

        .history-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-small:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .btn-delete {
            color: #e53935;
            border-color: #ffcdd2;
        }

        .btn-delete:hover {
            background: #ffebee;
            border-color: #e53935;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            color: white;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>tailorCV - 历史记录</h1>
            <p>查看你的简历定制历史</p>
        </header>

        <nav class="nav-tabs">
            <a href="/" class="nav-tab">文件上传</a>
            <a href="/guided" class="nav-tab">引导输入</a>
            <a href="/history" class="nav-tab active">历史记录</a>
        </nav>

        <div class="main-card">
            <div class="empty-state">
                <div class="empty-icon">📋</div>
                <div class="empty-text">暂无历史记录</div>
                <div class="empty-hint">开始定制你的第一份简历吧！</div>
            </div>

            <!-- 历史记录列表（开发中） -->
            <div class="history-list" style="display: none;">
                <!-- 示例历史记录项 -->
                <div class="history-item">
                    <div class="history-score">85</div>
                    <div class="history-info">
                        <div class="history-title">Python开发工程师 - 字节跳动</div>
                        <div class="history-meta">
                            <span>📅 2026-03-11 14:30</span>
                            <span>📄 匹配度: 85%</span>
                            <span>✓ 依据覆盖率: 92%</span>
                        </div>
                    </div>
                    <div class="history-actions">
                        <button class="btn-small">下载</button>
                        <button class="btn-small btn-delete">删除</button>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 tailorCV - 基于 ZhipuAI GLM 智能定制</p>
        </footer>
    </div>

    <script>
        // 历史记录功能开发中
        // TODO: 实现从后端获取历史记录
    </script>
</body>
</html>
