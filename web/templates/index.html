<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tailorCV - 智能简历定制工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .header {
            position: relative;
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        .close-manager-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 100, 100, 0.3);
            color: white;
            border-radius: 25px;
            font-size: 14px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .close-manager-btn:hover {
            background: rgba(255, 100, 100, 0.5);
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            position: relative;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }

        .tool-card.recommended {
            border: 3px solid #667eea;
        }

        .tool-card.recommended::before {
            content: '推荐';
            position: absolute;
            top: -10px;
            right: 20px;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
        }

        .tool-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .tool-icon.simple {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tool-icon.multi {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .tool-card h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tool-card p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .tool-features {
            list-style: none;
            margin-bottom: 25px;
        }

        .tool-features li {
            padding: 8px 0;
            color: #555;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tool-features li::before {
            content: '✓';
            color: #667eea;
            font-weight: bold;
        }

        .tool-provider {
            display: inline-block;
            padding: 5px 12px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .tool-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .tool-btn {
            flex: 1;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tool-btn:hover:not(:disabled) {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .tool-btn:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        .tool-card.multi .tool-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .tool-btn.loading {
            position: relative;
        }

        .tool-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stop-btn {
            padding: 15px 20px;
            background: #fff;
            border: 2px solid #e53935;
            color: #e53935;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: none;
        }

        .stop-btn:hover {
            background: #e53935;
            color: white;
        }

        .stop-btn.show {
            display: block;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: 5px;
        }

        .status-indicator.running {
            background: #4caf50;
            box-shadow: 0 0 8px #4caf50;
            animation: pulse 1.5s infinite;
        }

        .status-indicator.stopped {
            background: #ccc;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            display: none;
        }

        .status-text.show {
            display: block;
        }

        .status-text.running {
            color: #4caf50;
        }

        .footer {
            text-align: center;
            color: white;
            opacity: 0.7;
            margin-top: 50px;
            font-size: 14px;
        }

        .footer a {
            color: white;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2em;
            }
            .tools-grid {
                grid-template-columns: 1fr;
            }
            .tool-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="close-manager-btn" onclick="shutdownSelector()">关闭服务</button>
            <h1>🎯 tailorCV</h1>
            <p>智能简历定制工具 - 选择适合你的模式</p>
        </div>

        <div class="tools-grid">
            <!-- 简版工具 -->
            <div class="tool-card recommended" data-tool="simple">
                <div class="tool-icon simple">⚡</div>
                <h2>简版工具 <span class="status-indicator stopped" id="status-simple"></span></h2>
                <p>单模型快速生成，适合日常使用</p>
                <ul class="tool-features">
                    <li>智谱AI GLM-4.6 模型</li>
                    <li>响应速度快</li>
                    <li>操作简单直观</li>
                    <li>适合快速定制需求</li>
                </ul>
                <div>
                    <span class="tool-provider">智谱AI</span>
                    <span class="tool-provider">GLM-4.6</span>
                </div>
                <div class="tool-actions">
                    <button class="tool-btn" id="btn-simple" onclick="openTool('simple', event)">立即使用</button>
                    <button class="stop-btn" id="stop-simple" onclick="stopTool('simple', event)">停止服务</button>
                </div>
                <div class="status-text" id="status-text-simple"></div>
            </div>

            <!-- 多模型工具 -->
            <div class="tool-card multi" data-tool="multi">
                <div class="tool-icon multi">🔀</div>
                <h2>多模型工具 <span class="status-indicator stopped" id="status-multi"></span></h2>
                <p>多模型并行生成，结果对比选择</p>
                <ul class="tool-features">
                    <li>多个模型同时生成</li>
                    <li>结果可视化对比</li>
                    <li>支持智谱、阿里云</li>
                    <li>选择最佳方案</li>
                </ul>
                <div>
                    <span class="tool-provider">智谱AI</span>
                    <span class="tool-provider">阿里云</span>
                    <span class="tool-provider">Qwen</span>
                </div>
                <div class="tool-actions">
                    <button class="tool-btn" id="btn-multi" onclick="openTool('multi', event)">立即使用</button>
                    <button class="stop-btn" id="stop-multi" onclick="stopTool('multi', event)">停止服务</button>
                </div>
                <div class="status-text" id="status-text-multi"></div>
            </div>

        </div>

        <div class="footer">
            <p>tailorCV v1.0 | <a href="#">使用帮助</a> | <a href="#">反馈建议</a></p>
        </div>
    </div>

    <script>
        // 服务状态缓存
        const serviceStatus = {
            simple: { running: false, url: '' },
            multi: { running: false, url: '' }
        };

        // 更新状态指示器
        function updateStatusIndicator(toolId, running) {
            const indicator = document.getElementById('status-' + toolId);
            const stopBtn = document.getElementById('stop-' + toolId);
            const statusText = document.getElementById('status-text-' + toolId);

            if (indicator) {
                indicator.className = 'status-indicator ' + (running ? 'running' : 'stopped');
            }

            if (stopBtn) {
                stopBtn.classList.toggle('show', running);
            }

            if (statusText) {
                if (running) {
                    statusText.textContent = '● 服务运行中';
                    statusText.className = 'status-text show running';
                } else {
                    statusText.textContent = '';
                    statusText.className = 'status-text';
                }
            }

            serviceStatus[toolId].running = running;
        }

        // 打开工具（按需启动）
        async function openTool(toolId, event) {
            const btn = document.getElementById('btn-' + toolId);
            const originalText = btn.textContent;

            // 如果服务已经在运行，直接打开
            if (serviceStatus[toolId].running && serviceStatus[toolId].url) {
                window.open(serviceStatus[toolId].url, '_blank');
                return;
            }

            // 显示加载状态
            btn.textContent = '正在启动服务...';
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                // 调用启动 API
                const response = await fetch('/api/start/' + toolId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const result = await response.json();

                if (result.status === 'ready') {
                    // 更新状态
                    updateStatusIndicator(toolId, true);
                    serviceStatus[toolId].url = result.url;

                    // 打开新窗口
                    window.open(result.url, '_blank');

                    // 恢复按钮
                    btn.textContent = originalText;
                    btn.classList.remove('loading');
                    btn.disabled = false;
                } else {
                    throw new Error(result.message || '启动失败');
                }
            } catch (error) {
                console.error('启动失败:', error);
                btn.textContent = '启动失败，点击重试';
                btn.classList.remove('loading');
                btn.disabled = false;

                // 3秒后恢复
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 3000);
            }
        }

        // 停止工具服务
        async function stopTool(toolId, event) {
            event.stopPropagation();

            if (!confirm('确定要停止此服务吗？\n停止后需要重新启动才能使用。')) {
                return;
            }

            const stopBtn = document.getElementById('stop-' + toolId);

            try {
                stopBtn.textContent = '停止中...';
                stopBtn.disabled = true;

                const response = await fetch('/api/stop/' + toolId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const result = await response.json();

                if (result.status === 'stopped' || result.status === 'not_running') {
                    updateStatusIndicator(toolId, false);
                    serviceStatus[toolId].url = '';
                    stopBtn.textContent = '停止服务';
                    stopBtn.disabled = false;
                } else {
                    throw new Error(result.message || '停止失败');
                }
            } catch (error) {
                console.error('停止失败:', error);
                stopBtn.textContent = '停止失败';
                stopBtn.disabled = false;

                setTimeout(() => {
                    stopBtn.textContent = '停止服务';
                }, 2000);
            }
        }

        // 初始化：检查服务状态
        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const status = await response.json();

                for (const [toolId, info] of Object.entries(status)) {
                    updateStatusIndicator(toolId, info.running);
                    serviceStatus[toolId].url = info.url;
                }
            } catch (error) {
                console.log('无法获取服务状态');
            }
        }

        // 页面加载时检查状态
        document.addEventListener('DOMContentLoaded', checkStatus);

        // 定期刷新状态（每30秒）
        setInterval(checkStatus, 30000);

        // 关闭管理器
        async function shutdownSelector() {
            // 1. 检测子服务状态
            let status;
            try {
                const response = await fetch('/api/status');
                status = await response.json();
            } catch (error) {
                alert('无法获取服务状态，请稍后重试。');
                return;
            }

            // 2. 检查是否有运行中的子服务
            const runningTools = Object.entries(status)
                .filter(([id, info]) => info.running)
                .map(([id, info]) => id === 'simple' ? '简版工具' : '多模型工具');

            // 3. 如果有运行中的子服务，提醒用户
            if (runningTools.length > 0) {
                const confirmed = confirm(
                    `以下服务仍在运行：\n${runningTools.join('\n')}\n\n` +
                    `确定要关闭管理器吗？子服务将继续运行。`
                );
                if (!confirmed) return;
            } else {
                // 4. 没有子服务运行，直接确认
                if (!confirm('确定要关闭管理器吗？\n关闭后需要重新运行 python run.py 启动。')) {
                    return;
                }
            }

            // 5. 只关闭管理器
            try {
                await fetch('/api/shutdown', { method: 'POST' });
                alert('管理器已关闭');
                document.body.innerHTML = '<div style="text-align:center;padding:50px;color:white;"><h2>管理器已关闭</h2><p>请关闭此页面</p></div>';
            } catch (error) {
                alert('管理器已关闭');
            }
        }
    </script>
</body>
</html>
