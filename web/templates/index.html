<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tailorCV - 智能简历定制工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/notion-theme.css">
    <style>
        body {
            font-family: 'Inter', -apple-system, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #f6f5f4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .header {
            position: relative;
            text-align: center;
            color: rgba(0,0,0,0.95);
            margin-bottom: 50px;
        }

        .close-manager-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.05);
            color: rgba(0,0,0,0.95);
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
            border: 1px solid rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .close-manager-btn:hover {
            background: rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1.0;
            margin-bottom: 10px;
            color: rgba(0,0,0,0.95);
        }

        .header p {
            font-size: 20px;
            font-weight: 400;
            color: #615d59;
            line-height: 1.4;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .tool-card {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 12px;
            padding: 32px;
            box-shadow: rgba(0,0,0,0.04) 0px 4px 18px 0px, rgba(0,0,0,0.027) 0px 2.025px 7.85px 0px, rgba(0,0,0,0.02) 0px 0.8px 2.93px 0px, rgba(0,0,0,0.01) 0px 0.175px 1.04px 0px;
            transition: box-shadow 0.2s, transform 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            position: relative;
        }

        .tool-card:hover {
            transform: translateY(-2px);
            box-shadow: rgba(0,0,0,0.01) 0px 1px 3px 0px, rgba(0,0,0,0.02) 0px 3px 7px 0px, rgba(0,0,0,0.02) 0px 7px 15px 0px, rgba(0,0,0,0.04) 0px 14px 28px 0px, rgba(0,0,0,0.05) 0px 23px 52px 0px;
        }

        .tool-card.recommended {
            border: 2px solid #0075de;
        }

        .tool-card.recommended::before {
            content: '推荐';
            position: absolute;
            top: -10px;
            right: 20px;
            background: #0075de;
            color: white;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.125px;
        }

        .tool-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .tool-icon.simple {
            background: #0075de;
            color: white;
        }

        .tool-icon.multi {
            background: #ff64c8;
            color: white;
        }

        .tool-card h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.25px;
            line-height: 1.27;
            margin-bottom: 8px;
            color: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tool-card p {
            color: #615d59;
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .tool-features {
            list-style: none;
            margin-bottom: 20px;
        }

        .tool-features li {
            padding: 6px 0;
            color: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
        }

        .tool-features li::before {
            content: '✓';
            color: #1aae39;
            font-weight: 700;
        }

        .tool-provider {
            display: inline-block;
            padding: 4px 10px;
            background: #f6f5f4;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
            color: #615d59;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .tool-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .tool-btn {
            flex: 1;
            padding: 10px 16px;
            background: #0075de;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
            font-family: inherit;
        }

        .tool-btn:hover:not(:disabled) {
            background: #005bab;
        }

        .tool-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        .tool-btn:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .tool-card.multi .tool-btn {
            background: #ff64c8;
        }

        .tool-card.multi .tool-btn:hover:not(:disabled) {
            background: #e550b5;
        }

        .tool-btn.loading {
            position: relative;
        }

        .tool-btn.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stop-btn {
            padding: 10px 16px;
            background: #ffffff;
            border: 1px solid rgba(207,45,86,0.3);
            color: #cf2d56;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            display: none;
            font-family: inherit;
        }

        .stop-btn:hover {
            background: #cf2d56;
            color: white;
        }

        .stop-btn.show {
            display: block;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 5px;
        }

        .status-indicator.running {
            background: #1aae39;
            box-shadow: 0 0 6px #1aae39;
            animation: pulse 1.5s infinite;
        }

        .status-indicator.stopped {
            background: #a39e98;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 13px;
            color: #a39e98;
            margin-top: 10px;
            display: none;
            font-weight: 500;
        }

        .status-text.show {
            display: block;
        }

        .status-text.running {
            color: #1aae39;
        }

        .footer {
            text-align: center;
            color: #a39e98;
            margin-top: 50px;
            font-size: 14px;
        }

        .footer a {
            color: #0075de;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 36px;
            }
            .tools-grid {
                grid-template-columns: 1fr;
            }
            .tool-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="close-manager-btn" onclick="shutdownSelector()">关闭服务</button>
            <h1>tailorCV</h1>
            <p>智能简历定制工具 - 选择适合你的模式</p>
        </div>

        <div class="tools-grid">
            <!-- 简版工具 -->
            <div class="tool-card recommended" data-tool="simple">
                <div class="tool-icon simple">⚡</div>
                <h2>简版工具 <span class="status-indicator stopped" id="status-simple"></span></h2>
                <p>单模型快速生成，适合日常使用</p>
                <ul class="tool-features">
                    <li>智谱AI GLM-4.6 模型</li>
                    <li>响应速度快</li>
                    <li>操作简单直观</li>
                    <li>适合快速定制需求</li>
                </ul>
                <div>
                    <span class="tool-provider">智谱AI</span>
                    <span class="tool-provider">GLM-4.6</span>
                </div>
                <div class="tool-actions">
                    <button class="tool-btn" id="btn-simple" onclick="openTool('simple', event)">立即使用</button>
                    <button class="stop-btn" id="stop-simple" onclick="stopTool('simple', event)">停止服务</button>
                </div>
                <div class="status-text" id="status-text-simple"></div>
            </div>

            <!-- 多模型工具 -->
            <div class="tool-card multi" data-tool="multi">
                <div class="tool-icon multi">🔀</div>
                <h2>多模型工具 <span class="status-indicator stopped" id="status-multi"></span></h2>
                <p>多模型并行生成，结果对比选择</p>
                <ul class="tool-features">
                    <li>多个模型同时生成</li>
                    <li>结果可视化对比</li>
                    <li>支持智谱、阿里云</li>
                    <li>选择最佳方案</li>
                </ul>
                <div>
                    <span class="tool-provider">智谱AI</span>
                    <span class="tool-provider">阿里云</span>
                    <span class="tool-provider">Qwen</span>
                </div>
                <div class="tool-actions">
                    <button class="tool-btn" id="btn-multi" onclick="openTool('multi', event)">立即使用</button>
                    <button class="stop-btn" id="stop-multi" onclick="stopTool('multi', event)">停止服务</button>
                </div>
                <div class="status-text" id="status-text-multi"></div>
            </div>

        </div>

        <div class="footer">
            <p>tailorCV v1.0 | <a href="#">使用帮助</a> | <a href="#">反馈建议</a></p>
        </div>
    </div>

    <script>
        // 服务状态缓存
        const serviceStatus = {
            simple: { running: false, url: '' },
            multi: { running: false, url: '' }
        };

        // 更新状态指示器
        function updateStatusIndicator(toolId, running) {
            const indicator = document.getElementById('status-' + toolId);
            const stopBtn = document.getElementById('stop-' + toolId);
            const statusText = document.getElementById('status-text-' + toolId);

            if (indicator) {
                indicator.className = 'status-indicator ' + (running ? 'running' : 'stopped');
            }

            if (stopBtn) {
                stopBtn.classList.toggle('show', running);
            }

            if (statusText) {
                if (running) {
                    statusText.textContent = '● 服务运行中';
                    statusText.className = 'status-text show running';
                } else {
                    statusText.textContent = '';
                    statusText.className = 'status-text';
                }
            }

            serviceStatus[toolId].running = running;
        }

        // 打开工具（按需启动）
        async function openTool(toolId, event) {
            const btn = document.getElementById('btn-' + toolId);
            const originalText = btn.textContent;

            // 如果服务已经在运行，直接打开
            if (serviceStatus[toolId].running && serviceStatus[toolId].url) {
                window.open(serviceStatus[toolId].url, '_blank');
                return;
            }

            // 显示加载状态
            btn.textContent = '正在启动服务...';
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                // 调用启动 API
                const response = await fetch('/api/start/' + toolId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const result = await response.json();

                if (result.status === 'ready') {
                    // 更新状态
                    updateStatusIndicator(toolId, true);
                    serviceStatus[toolId].url = result.url;

                    // 打开新窗口
                    window.open(result.url, '_blank');

                    // 恢复按钮
                    btn.textContent = originalText;
                    btn.classList.remove('loading');
                    btn.disabled = false;
                } else {
                    throw new Error(result.message || '启动失败');
                }
            } catch (error) {
                console.error('启动失败:', error);
                btn.textContent = '启动失败，点击重试';
                btn.classList.remove('loading');
                btn.disabled = false;

                // 3秒后恢复
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 3000);
            }
        }

        // 停止工具服务
        async function stopTool(toolId, event) {
            event.stopPropagation();

            if (!confirm('确定要停止此服务吗？\n停止后需要重新启动才能使用。')) {
                return;
            }

            const stopBtn = document.getElementById('stop-' + toolId);

            try {
                stopBtn.textContent = '停止中...';
                stopBtn.disabled = true;

                const response = await fetch('/api/stop/' + toolId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const result = await response.json();

                if (result.status === 'stopped' || result.status === 'not_running') {
                    updateStatusIndicator(toolId, false);
                    serviceStatus[toolId].url = '';
                    stopBtn.textContent = '停止服务';
                    stopBtn.disabled = false;
                } else {
                    throw new Error(result.message || '停止失败');
                }
            } catch (error) {
                console.error('停止失败:', error);
                stopBtn.textContent = '停止失败';
                stopBtn.disabled = false;

                setTimeout(() => {
                    stopBtn.textContent = '停止服务';
                }, 2000);
            }
        }

        // 初始化：检查服务状态
        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const status = await response.json();

                for (const [toolId, info] of Object.entries(status)) {
                    updateStatusIndicator(toolId, info.running);
                    serviceStatus[toolId].url = info.url;
                }
            } catch (error) {
                console.log('无法获取服务状态');
            }
        }

        // 页面加载时检查状态
        document.addEventListener('DOMContentLoaded', checkStatus);

        // 定期刷新状态（每30秒）
        setInterval(checkStatus, 30000);

        // 关闭管理器
        async function shutdownSelector() {
            // 1. 检测子服务状态
            let status;
            try {
                const response = await fetch('/api/status');
                status = await response.json();
            } catch (error) {
                alert('无法获取服务状态，请稍后重试。');
                return;
            }

            // 2. 检查是否有运行中的子服务
            const runningTools = Object.entries(status)
                .filter(([id, info]) => info.running)
                .map(([id, info]) => id === 'simple' ? '简版工具' : '多模型工具');

            // 3. 如果有运行中的子服务，提醒用户
            if (runningTools.length > 0) {
                const confirmed = confirm(
                    `以下服务仍在运行：\n${runningTools.join('\n')}\n\n` +
                    `确定要关闭管理器吗？子服务将继续运行。`
                );
                if (!confirmed) return;
            } else {
                // 4. 没有子服务运行，直接确认
                if (!confirm('确定要关闭管理器吗？\n关闭后需要重新运行 python run.py 启动。')) {
                    return;
                }
            }

            // 5. 只关闭管理器
            try {
                await fetch('/api/shutdown', { method: 'POST' });
                alert('管理器已关闭');
                document.body.innerHTML = '<div style="text-align:center;padding:50px;color:rgba(0,0,0,0.7);"><h2>管理器已关闭</h2><p>请关闭此页面</p></div>';
            } catch (error) {
                alert('管理器已关闭');
            }
        }
    </script>
</body>
</html>
