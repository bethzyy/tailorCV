name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check core/ apps/ tests/ --ignore E501

      - name: Build verification
        run: python -c "from apps.simple_app import create_app; print('Import OK')"

      - name: Run unit tests
        env:
          TESTING: 'true'
          SECRET_KEY: 'ci-test-secret-key'
          WECHAT_SANDBOX: 'true'
        run: |
          pytest -m "unit and not slow" -v --tb=short --junitxml=test-results.xml
        continue-on-error: true

      - name: Upload test results
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 7

  summary:
    name: CI Summary
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "CI pipeline completed"
          echo "Python 3.10: ${{ needs.test.result }}"
