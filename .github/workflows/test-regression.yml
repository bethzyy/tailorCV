name: Regression Tests

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'apps/**'
      - 'prompts/**'
      - 'tests/regression/**'

jobs:
  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run regression tests
        env:
          TESTING: 'true'
          SECRET_KEY: 'ci-test-secret-key'
          WECHAT_SANDBOX: 'true'
        run: pytest -m regression -v --tb=short --junitxml=regression-results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: regression-results.xml
          retention-days: 30

      - name: Fail on regression
        if: failure()
        run: |
          echo "::error::Regression tests failed! Check the results artifact."
          echo "A baseline comparison should be performed to identify what changed."
