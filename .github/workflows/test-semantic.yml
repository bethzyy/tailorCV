name: Semantic Quality Tests

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'AI model to test against'
        required: false
        default: 'glm-4-flash'

jobs:
  semantic:
    name: Semantic Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run semantic quality tests
        env:
          TESTING: 'true'
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          PRIMARY_MODEL: ${{ github.event.inputs.model || 'glm-4-flash' }}
          SECRET_KEY: 'ci-test-secret-key'
          WECHAT_SANDBOX: 'true'
        run: pytest tests/semantic/ -v --tb=long -rA 2>&1 | tee semantic-results.txt

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-report
          path: semantic-results.txt
          retention-days: 30
